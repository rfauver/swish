<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swish</title>
    <script>
      // SPA redirect shim for GitHub Pages.
      // Encodes the requested path into a query param and redirects to the
      // root index.html, which decodes it and restores the correct URL via
      // history.replaceState before React boots.
      // pathSegmentsToKeep=1 preserves the /repo-name/ base path.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
